<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07080a">
<title>The Atlas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root {
    --bg: #07080a;
    --panel: #0d0e11;
    --panel-2: #131519;
    --panel-3: #181b21;
    --line: #1c2027;
    --line-bright: #2a2f38;
    --ink: #eceef1;
    --ink-dim: #828892;
    --ink-faint: #525861;
    --accent: #d9ff3f;
    --accent-dim: #8fa028;
    --cyan: #4fd8e8;
    --amber: #ffb547;
    --danger: #ff5c5c;
    --ok: #57e08a;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Archivo', sans-serif;
    --black: 'Archivo Black', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  #root {
    font-family: var(--sans); background: var(--bg); color: var(--ink);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
    background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 44px 44px; background-position: -1px -1px;
  }
  #root::before { content:""; position:fixed; inset:0; pointer-events:none;
    background: radial-gradient(ellipse 90% 45% at 50% 0%, rgba(217,255,63,.045), transparent 70%); }
  .wrap { max-width: 760px; margin:0 auto; padding:0 14px 90px; position:relative; }

  /* HEADER */
  .hd { display:flex; align-items:flex-end; justify-content:space-between; padding:22px 4px 14px; border-bottom:1px solid var(--line-bright); }
  .hd .name { font-family:var(--black); font-size:24px; letter-spacing:-1px; line-height:1; }
  .hd .name .c { color:var(--accent); }
  .hd .sub { font-family:var(--mono); font-size:9px; color:var(--ink-faint); letter-spacing:1.5px; text-transform:uppercase; margin-top:5px; }
  .hd .meta { text-align:right; font-family:var(--mono); font-size:10px; color:var(--ink-dim); line-height:1.5; }
  .hd .meta .clk { color:var(--ink); font-size:14px; font-weight:500; }

  /* NAV */
  .nav { display:flex; gap:0; margin:14px 0 18px; border:1px solid var(--line-bright); overflow-x:auto; }
  .nav button { flex:1 0 auto; background:var(--panel); color:var(--ink-dim); border:none; border-right:1px solid var(--line-bright);
    font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:1.2px; padding:11px 12px; cursor:pointer; transition:.15s; white-space:nowrap; }
  .nav button:last-child { border-right:none; }
  .nav button.on { background:var(--accent); color:#000; font-weight:700; }
  .nav button:not(.on):hover { color:var(--ink); background:var(--panel-2); }

  /* GENERIC */
  .sec-hd { display:flex; align-items:baseline; justify-content:space-between; margin:18px 2px 10px; }
  .sec-hd h2 { font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:2px; color:var(--ink-dim); font-weight:500; }
  .sec-hd .ct { font-family:var(--mono); font-size:10px; color:var(--ink-faint); }
  .nav button.badge { position:relative; }
  .nav button.badge::after { content:""; position:absolute; top:6px; right:8px; width:6px; height:6px; background:var(--accent); border-radius:50%; }
  .card { background:var(--panel); border:1px solid var(--line-bright); padding:14px; margin-bottom:9px; position:relative; }
  .card.acc::before { content:""; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--accent); }
  .row { display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .ttl { font-size:15px; font-weight:600; letter-spacing:-.3px; }
  .note { color:var(--ink-dim); font-size:12px; margin-top:3px; line-height:1.45; }
  .x { background:none; border:none; color:var(--ink-faint); cursor:pointer; font-family:var(--mono); font-size:14px; padding:2px 5px; line-height:1; }
  .x:hover { color:var(--danger); }
  .empty { text-align:center; padding:24px 10px; color:var(--ink-faint); font-family:var(--mono); font-size:11px; letter-spacing:1px; }

  /* FORMS */
  .add { display:flex; gap:7px; margin-bottom:10px; flex-wrap:wrap; }
  input.f, textarea.f, select.f { background:var(--panel-2); border:1px solid var(--line-bright); color:var(--ink);
    font-family:var(--sans); font-size:13px; padding:10px 11px; outline:none; flex:1; min-width:90px; }
  input.f:focus, textarea.f:focus, select.f:focus { border-color:var(--accent-dim); }
  input.f::placeholder, textarea.f::placeholder { color:var(--ink-faint); }
  textarea.f { width:100%; flex-basis:100%; min-height:62px; resize:vertical; }
  input[type=date].f, input[type=number].f { flex:0 0 auto; min-width:120px; font-family:var(--mono); font-size:12px; }
  .btn { background:var(--accent); color:#000; border:none; font-family:var(--mono); font-size:10px; text-transform:uppercase;
    letter-spacing:1.2px; font-weight:700; padding:10px 16px; cursor:pointer; white-space:nowrap; transition:.15s; }
  .btn:hover { background:#e7ff66; } .btn.sm { padding:7px 10px; }
  .chip { background:var(--panel-3); border:1px solid var(--line-bright); color:var(--ink-dim); font-family:var(--mono);
    font-size:9px; text-transform:uppercase; letter-spacing:1px; padding:3px 7px; }
  .chip.due { color:var(--amber); border-color:var(--amber); }
  .chip.over { color:var(--danger); border-color:var(--danger); }
  .chip.ok { color:var(--ok); border-color:var(--ok); }

  /* DASHBOARD TILES */
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .tile { background:var(--panel); border:1px solid var(--line-bright); padding:13px; position:relative; overflow:hidden; }
  .tile .lbl { font-family:var(--mono); font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--ink-faint); }
  .tile .big { font-family:var(--black); font-size:30px; line-height:1; margin-top:8px; letter-spacing:-1px; }
  .tile .big.acc { color:var(--accent); } .tile .big.cy { color:var(--cyan); } .tile .big.am { color:var(--amber); }
  .tile .cap { font-family:var(--mono); font-size:10px; color:var(--ink-dim); margin-top:6px; }
  .tile.wide { grid-column:1 / -1; }
  .listrow { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:7px 0; border-bottom:1px solid var(--line); font-size:13px; }
  .listrow:last-child { border-bottom:none; }
  .listrow .mut { font-family:var(--mono); font-size:10px; color:var(--ink-dim); }
  .bar { height:5px; background:var(--panel-2); border:1px solid var(--line); margin-top:8px; }
  .bar > i { display:block; height:100%; background:var(--accent); }
  .cb { width:18px; height:18px; border:1px solid var(--line-bright); background:var(--panel-2); cursor:pointer; flex:0 0 auto; }
  .cb.on { background:var(--accent); border-color:var(--accent); }
  .strike { text-decoration:line-through; color:var(--ink-faint); }

  .week { display:flex; gap:5px; margin-top:10px; }
  .day { flex:1; aspect-ratio:1; border:1px solid var(--line-bright); background:var(--panel-2); cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
  .day .dl { font-family:var(--mono); font-size:8px; color:var(--ink-faint); } .day .dn { font-family:var(--mono); font-size:11px; color:var(--ink-dim); }
  .day.done { background:var(--accent); border-color:var(--accent); } .day.done .dl,.day.done .dn { color:#000; }

  .ftr { margin-top:22px; padding-top:12px; border-top:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; font-family:var(--mono); font-size:9px; color:var(--ink-faint); flex-wrap:wrap; gap:8px; }
  .ftr button { background:none; border:none; color:var(--ink-faint); cursor:pointer; font-family:var(--mono); font-size:9px; text-decoration:underline; }
  .ftr button:hover { color:var(--accent); }
  .loading { text-align:center; padding:120px 0; font-family:var(--mono); color:var(--ink-dim); font-size:12px; letter-spacing:2px; }
  .modal { position:fixed; inset:0; background:rgba(0,0,0,.7); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50; }
  .modal .box { background:var(--panel); border:1px solid var(--line-bright); padding:18px; max-width:520px; width:100%; max-height:80vh; overflow:auto; }
  .modal h3 { font-family:var(--mono); font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--accent); margin-bottom:12px; }
  .modal pre { background:var(--panel-2); border:1px solid var(--line); padding:10px; font-family:var(--mono); font-size:10px; color:var(--ink-dim); overflow:auto; white-space:pre-wrap; word-break:break-all; }
</style>
<style> html,body{margin:0;background:#07080a;} </style>
</head>
<body>
<div id="root"><div style="font-family:monospace;color:#828892;text-align:center;padding:120px 0;letter-spacing:2px;font-size:12px">BOOTING THE ATLAS…</div></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;
const KEY = 'lifehub:state';
const PROJECT = 'THE ATLAS';
const DOW = ['M','T','W','T','F','S','S'];

/* ============ STORE ============
   Local by default. To go live with Supabase + let Claude read/edit from chat,
   fill SUPABASE_URL and SUPABASE_KEY below. Everything else stays the same. */
const SUPABASE_URL = 'https://wwhzesqdqjznwbsmptpg.supabase.co';   // e.g. https://xxxx.supabase.co
const SUPABASE_KEY = 'sb_publishable_GMB_Q1CAlHQQmzZgsBa5VA_M_BWINhb';   // anon public key
const SB_ROW_ID = 'dylan';

const Store = {
  live: !!(SUPABASE_URL && SUPABASE_KEY),
  hasLocal(){ return typeof window!=='undefined' && window.storage && typeof window.storage.get==='function'; },
  async load() {
    if (this.live) {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/hub_state?id=eq.${SB_ROW_ID}&select=data`, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }});
      if(!r.ok) throw new Error('Supabase load '+r.status+': '+(await r.text()).slice(0,120));
      const j = await r.json();
      return j[0] ? j[0].data : null;
    }
    if(this.hasLocal()){ try { const r = await window.storage.get(KEY); return r && r.value ? JSON.parse(r.value) : null; } catch { return null; } }
    try { const v = localStorage.getItem(KEY); return v ? JSON.parse(v) : null; } catch { return null; }
  },
  async save(data) {
    if (this.live) {
      try {
        const r = await fetch(`${SUPABASE_URL}/rest/v1/hub_state?id=eq.${SB_ROW_ID}`, {
          method:'PATCH',
          headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`, 'Content-Type':'application/json', Prefer:'return=minimal' },
          body: JSON.stringify({ data })});
        if(!r.ok) console.error('Supabase save', r.status);
      } catch(e){ console.error(e); }
      return;
    }
    if(this.hasLocal()){ try { await window.storage.set(KEY, JSON.stringify(data)); } catch(e){ console.error(e); } return; }
    try { localStorage.setItem(KEY, JSON.stringify(data)); } catch(e){ console.error(e); }
  }
};

function seed() {
  return {
    profile: { name:'DYLAN', mission:'Build the system. Compound the wins.' },
    dump: [],
    life: [ { id:1, title:'Set up the hub', due: todayISO(), kind:'task' } ],
    work: { projects:[{id:1,name:'Life Hub',status:'active',next:'wire to Supabase'}], tasks:[{id:1,title:'Define this week\u2019s 3 priorities',done:false,due:todayISO()}] },
    money: { items:[], goals:[{id:1,title:'Emergency fund',target:1000,saved:0}] },
    health: { habits:[{id:1,name:'Move / train',log:{}},{id:2,name:'Deep work',log:{}}], metrics:[] },
    ideas: [], learning: [{id:1,title:'Crypto / trading basics',progress:0,note:''}],
    inbox: [],
  };
}

/* inbox note kinds — written by Claude from chat */
const KIND = {
  reminder: { label:'reminder', col:'var(--amber)' },
  push:     { label:'push',     col:'var(--danger)' },
  idea:     { label:'idea',     col:'var(--cyan)' },
  support:  { label:'support',  col:'var(--accent)' },
  flag:     { label:'heads-up', col:'var(--ink-dim)' },
};

function hydrate(d){
  const base = seed();
  if(!d || typeof d!=='object' || !d.profile) return base;
  return {
    ...base, ...d,
    profile: { ...base.profile, ...(d.profile||{}) },
    work:    { ...base.work,    ...(d.work||{}) },
    money:   { ...base.money,   ...(d.money||{}) },
    health:  { ...base.health,  ...(d.health||{}) },
  };
}

/* date utils */
function todayISO(){ return new Date().toISOString().slice(0,10); }
function keyOf(d){ return d.toISOString().slice(0,10); }
const TODAY = todayISO();
function daysUntil(iso){ if(!iso) return null; const a=new Date(iso+'T00:00'); const b=new Date(TODAY+'T00:00'); return Math.round((a-b)/86400000); }
function dueChip(iso){ const d=daysUntil(iso); if(d===null) return null;
  if(d<0) return <span className="chip over">{Math.abs(d)}d late</span>;
  if(d===0) return <span className="chip due">today</span>;
  if(d<=3) return <span className="chip due">{d}d</span>;
  return <span className="chip">{d}d</span>; }
function weekDates(){ const out=[],now=new Date(),day=(now.getDay()+6)%7,mon=new Date(now); mon.setDate(now.getDate()-day);
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);out.push(d);} return out; }

function App(){
  const [data,setData]=useState(null);
  const [tab,setTab]=useState('dash');
  const [clock,setClock]=useState('');
  const [showData,setShowData]=useState(false);
  const [err,setErr]=useState('');

  useEffect(()=>{ (async()=>{
    try { const d=await Store.load(); setData(hydrate(d)); }
    catch(e){ setErr(String(e.message||e)); setData(hydrate(null)); }
  })(); },[]);
  useEffect(()=>{ if(data) Store.save(data); },[data]);
  useEffect(()=>{ const t=()=>setClock(new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})); t(); const id=setInterval(t,20000); return()=>clearInterval(id); },[]);

  if(!data) return <div className="loading">BOOTING THE ATLAS…</div>;
  const up=fn=>setData(d=>{const c=JSON.parse(JSON.stringify(d)); fn(c); return c;});
  const dateStr=new Date().toLocaleDateString([],{weekday:'long',day:'2-digit',month:'short'}).toUpperCase();

  const unread = (data.inbox||[]).filter(m=>!m.read).length;
  const TABS=[['dash','dash'],['inbox', unread?`inbox (${unread})`:'inbox'],['life','life'],['work','work'],['money','money'],['health','health'],['ideas','ideas'],['dump','dump']];

  return (
    <div className="wrap">
      <div className="hd">
        <div>
          <div className="name">{PROJECT}<span className="c">_</span></div>
          <div className="sub">{data.profile.name} · {data.profile.mission}</div>
        </div>
        <div className="meta"><div className="clk">{clock}</div><div>{dateStr}</div><div>{Store.live?'◉ LIVE':'○ LOCAL'}</div></div>
      </div>

      <div className="nav">{TABS.map(([id,l])=>(
        <button key={id} className={(tab===id?'on ':'')+(id==='inbox'&&unread?'badge':'')} onClick={()=>setTab(id)}>{l}</button>))}</div>

      {err && <div style={{border:'1px solid var(--danger)',color:'var(--danger)',fontFamily:'var(--mono)',fontSize:11,padding:'10px 12px',marginBottom:14}}>CONNECTION ISSUE — running on fallback. {err}</div>}

      {tab==='dash' && <Dash data={data} up={up} go={setTab} />}
      {tab==='inbox' && <Inbox data={data} up={up} />}
      {tab==='life' && <Life data={data} up={up} />}
      {tab==='work' && <Work data={data} up={up} />}
      {tab==='money' && <Money data={data} up={up} />}
      {tab==='health' && <Health data={data} up={up} />}
      {tab==='ideas' && <Ideas data={data} up={up} />}
      {tab==='dump' && <Dump data={data} up={up} />}

      <div className="ftr">
        <span>{PROJECT} v2 · {Store.live?'SUPABASE':'LOCAL STORE'}</span>
        <span>
          <button onClick={()=>setShowData(true)}>export data</button> ·{' '}
          <button onClick={()=>{ if(confirm('Wipe everything?')) setData(seed()); }}>reset</button>
        </span>
      </div>

      {showData && <DataModal data={data} close={()=>setShowData(false)} />}
    </div>
  );
}

/* ---------- DASHBOARD (dense control panel) ---------- */
function Dash({ data, up, go }){
  const tasks = data.work.tasks.filter(t=>!t.done);
  const deadlines = [...data.life].filter(d=>d.due).sort((a,b)=>a.due.localeCompare(b.due)).slice(0,5);
  const moneyGoal = data.money.goals[0];
  const streak = h => { let s=0; for(let i=0;i<60;i++){const d=new Date();d.setDate(d.getDate()-i); if(h.log[keyOf(d)])s++; else if(i>0)break;} return s; };
  const topHabit = data.health.habits.map(h=>({n:h.name,s:streak(h)})).sort((a,b)=>b.s-a.s)[0];
  const balance = data.money.items.reduce((a,b)=>a+(b.kind==='in'?b.amount:-b.amount),0);
  const unread = (data.inbox||[]).filter(m=>!m.read);

  return (
    <div>
      <div className="sec-hd"><h2>// Control Panel</h2><span className="ct">{TODAY}</span></div>
      {unread.length>0 && <div className="tile wide" style={{marginBottom:9,borderColor:'var(--accent)'}}>
        <div className="lbl" style={{color:'var(--accent)'}}>◉ From Claude · {unread.length} new</div>
        {unread.slice(0,3).map(m=>(
          <div className="listrow" key={m.id}>
            <span style={{display:'flex',gap:8,alignItems:'flex-start'}}>
              <span className="chip" style={{color:(KIND[m.kind]||KIND.flag).col,borderColor:(KIND[m.kind]||KIND.flag).col,flex:'0 0 auto'}}>{(KIND[m.kind]||KIND.flag).label}</span>
              <span style={{fontSize:13}}>{m.text}</span></span>
          </div>
        ))}
        <div className="cap" style={{marginTop:8,cursor:'pointer',color:'var(--accent)'}} onClick={()=>go('inbox')}>open inbox →</div>
      </div>}
      <div className="grid">
        <div className="tile" onClick={()=>go('work')} style={{cursor:'pointer'}}>
          <div className="lbl">Open tasks</div><div className="big acc">{tasks.length}</div>
          <div className="cap">{tasks[0]? tasks[0].title : 'all clear'}</div>
        </div>
        <div className="tile" onClick={()=>go('life')} style={{cursor:'pointer'}}>
          <div className="lbl">Next deadline</div>
          <div className="big am">{deadlines[0]? (daysUntil(deadlines[0].due)<0?'!':daysUntil(deadlines[0].due)+'d'):'—'}</div>
          <div className="cap">{deadlines[0]? deadlines[0].title : 'nothing due'}</div>
        </div>
        <div className="tile" onClick={()=>go('money')} style={{cursor:'pointer'}}>
          <div className="lbl">Money flow</div><div className="big cy">{balance>=0?'+':''}{balance}</div>
          <div className="cap">{moneyGoal? `${moneyGoal.title}: ${moneyGoal.saved}/${moneyGoal.target}`:'no goal set'}</div>
        </div>
        <div className="tile" onClick={()=>go('health')} style={{cursor:'pointer'}}>
          <div className="lbl">Top streak</div><div className="big">{topHabit? topHabit.s : 0}</div>
          <div className="cap">{topHabit? topHabit.n : 'no habits'}</div>
        </div>

        <div className="tile wide">
          <div className="lbl">Upcoming · deadlines & assignments</div>
          {deadlines.length===0 && <div className="cap" style={{marginTop:10}}>nothing scheduled</div>}
          {deadlines.map(d=>(
            <div className="listrow" key={d.id}>
              <span>{d.title}</span>
              <span style={{display:'flex',gap:8,alignItems:'center'}}><span className="mut">{d.kind}</span>{dueChip(d.due)}</span>
            </div>
          ))}
        </div>

        <div className="tile wide">
          <div className="lbl">Today · quick tasks</div>
          {tasks.length===0 && <div className="cap" style={{marginTop:10}}>nothing open</div>}
          {tasks.slice(0,5).map(t=>(
            <div className="listrow" key={t.id}>
              <span style={{display:'flex',gap:9,alignItems:'center'}}>
                <span className="cb" onClick={()=>up(d=>{const x=d.work.tasks.find(z=>z.id===t.id); x.done=true;})}></span>
                {t.title}</span>
              {t.due && dueChip(t.due)}
            </div>
          ))}
        </div>

        {moneyGoal && <div className="tile wide">
          <div className="lbl">{moneyGoal.title}</div>
          <div className="bar"><i style={{width:Math.min(100,(moneyGoal.saved/moneyGoal.target*100||0))+'%'}}/></div>
          <div className="cap">{moneyGoal.saved} / {moneyGoal.target} ({Math.round(moneyGoal.saved/moneyGoal.target*100||0)}%)</div>
        </div>}
      </div>
    </div>
  );
}

/* ---------- LIFE: deadlines / assignments ---------- */
function Life({ data, up }){
  const [t,setT]=useState(''),[due,setDue]=useState(''),[kind,setKind]=useState('assignment');
  const add=()=>{ if(!t.trim())return; up(d=>d.life.push({id:Date.now(),title:t.trim(),due:due||null,kind})); setT('');setDue(''); };
  const sorted=[...data.life].sort((a,b)=>(a.due||'9999').localeCompare(b.due||'9999'));
  return (<div>
    <div className="sec-hd"><h2>// Life · Deadlines</h2><span className="ct">{data.life.length} tracked</span></div>
    <div className="add">
      <input className="f" placeholder="Deadline / assignment…" value={t} onChange={e=>setT(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} />
      <input type="date" className="f" value={due} onChange={e=>setDue(e.target.value)} />
      <select className="f" value={kind} onChange={e=>setKind(e.target.value)}><option>assignment</option><option>deadline</option><option>appointment</option><option>task</option></select>
      <button className="btn" onClick={add}>Add</button>
    </div>
    {sorted.length===0 && <div className="empty">NOTHING TRACKED</div>}
    {sorted.map(d=>(<div className={"card "+((daysUntil(d.due)!==null&&daysUntil(d.due)<=3)?'acc':'')} key={d.id}>
      <div className="row"><div><div className="ttl">{d.title}</div><div className="note">{d.kind}{d.due?` · ${d.due}`:''}</div></div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>{dueChip(d.due)}<button className="x" onClick={()=>up(x=>{x.life=x.life.filter(z=>z.id!==d.id);})}>✕</button></div></div>
    </div>))}
  </div>);
}

/* ---------- WORK ---------- */
function Work({ data, up }){
  const [pt,setPt]=useState(''),[tt,setTt]=useState(''),[tdue,setTdue]=useState('');
  const addP=()=>{ if(!pt.trim())return; up(d=>d.work.projects.push({id:Date.now(),name:pt.trim(),status:'active',next:''})); setPt(''); };
  const addT=()=>{ if(!tt.trim())return; up(d=>d.work.tasks.unshift({id:Date.now(),title:tt.trim(),done:false,due:tdue||null})); setTt('');setTdue(''); };
  return (<div>
    <div className="sec-hd"><h2>// Work · Tasks</h2><span className="ct">{data.work.tasks.filter(t=>!t.done).length} open</span></div>
    <div className="add"><input className="f" placeholder="New task…" value={tt} onChange={e=>setTt(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addT()} />
      <input type="date" className="f" value={tdue} onChange={e=>setTdue(e.target.value)} /><button className="btn" onClick={addT}>Add</button></div>
    {data.work.tasks.length===0 && <div className="empty">NO TASKS</div>}
    {data.work.tasks.map(t=>(<div className="card" key={t.id}><div className="row">
      <span style={{display:'flex',gap:10,alignItems:'center'}}>
        <span className={"cb "+(t.done?'on':'')} onClick={()=>up(d=>{const x=d.work.tasks.find(z=>z.id===t.id); x.done=!x.done;})}></span>
        <span className={t.done?'ttl strike':'ttl'}>{t.title}</span></span>
      <span style={{display:'flex',gap:8,alignItems:'center'}}>{t.due&&dueChip(t.due)}<button className="x" onClick={()=>up(d=>{d.work.tasks=d.work.tasks.filter(z=>z.id!==t.id);})}>✕</button></span>
    </div></div>))}
    <div className="sec-hd"><h2>// Projects</h2><span className="ct">{data.work.projects.length}</span></div>
    <div className="add"><input className="f" placeholder="New project…" value={pt} onChange={e=>setPt(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addP()} /><button className="btn" onClick={addP}>Add</button></div>
    {data.work.projects.map(p=>(<div className="card acc" key={p.id}><div className="row">
      <div><div className="ttl">{p.name}</div>{p.next&&<div className="note">next: {p.next}</div>}</div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}><span className="chip ok">{p.status}</span><button className="x" onClick={()=>up(d=>{d.work.projects=d.work.projects.filter(z=>z.id!==p.id);})}>✕</button></div></div>
    </div>))}
  </div>);
}

/* ---------- MONEY ---------- */
function Money({ data, up }){
  const [lbl,setLbl]=useState(''),[amt,setAmt]=useState(''),[kind,setKind]=useState('out');
  const add=()=>{ const a=parseFloat(amt); if(!lbl.trim()||isNaN(a))return; up(d=>d.money.items.unshift({id:Date.now(),label:lbl.trim(),amount:a,kind})); setLbl('');setAmt(''); };
  const bal=data.money.items.reduce((a,b)=>a+(b.kind==='in'?b.amount:-b.amount),0);
  return (<div>
    <div className="sec-hd"><h2>// Money</h2><span className="ct">net {bal>=0?'+':''}{bal}</span></div>
    {data.money.goals.map(g=>(<div className="card acc" key={g.id}>
      <div className="row"><div className="ttl">{g.title}</div>
        <span style={{display:'flex',gap:6}}>
          <button className="btn sm" onClick={()=>up(d=>{const x=d.money.goals.find(z=>z.id===g.id); x.saved=Math.max(0,x.saved-50);})}>−50</button>
          <button className="btn sm" onClick={()=>up(d=>{const x=d.money.goals.find(z=>z.id===g.id); x.saved+=50;})}>+50</button></span></div>
      <div className="bar"><i style={{width:Math.min(100,(g.saved/g.target*100||0))+'%'}}/></div>
      <div className="note">{g.saved} / {g.target}</div></div>))}
    <div className="sec-hd"><h2>// Ledger</h2><span className="ct">{data.money.items.length}</span></div>
    <div className="add"><input className="f" placeholder="Label…" value={lbl} onChange={e=>setLbl(e.target.value)} />
      <input type="number" className="f" placeholder="0" value={amt} onChange={e=>setAmt(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} />
      <select className="f" value={kind} onChange={e=>setKind(e.target.value)}><option value="out">out</option><option value="in">in</option></select>
      <button className="btn" onClick={add}>Add</button></div>
    {data.money.items.length===0 && <div className="empty">NO ENTRIES</div>}
    {data.money.items.map(it=>(<div className="card" key={it.id}><div className="row">
      <div className="ttl">{it.label}</div>
      <span style={{display:'flex',gap:10,alignItems:'center'}}>
        <span style={{fontFamily:'var(--mono)',color: it.kind==='in'?'var(--ok)':'var(--danger)'}}>{it.kind==='in'?'+':'−'}{it.amount}</span>
        <button className="x" onClick={()=>up(d=>{d.money.items=d.money.items.filter(z=>z.id!==it.id);})}>✕</button></span></div>
    </div>))}
  </div>);
}

/* ---------- HEALTH ---------- */
function Health({ data, up }){
  const [n,setN]=useState(''); const wk=weekDates();
  const add=()=>{ if(!n.trim())return; up(d=>d.health.habits.push({id:Date.now(),name:n.trim(),log:{}})); setN(''); };
  const streak=h=>{let s=0;for(let i=0;i<60;i++){const d=new Date();d.setDate(d.getDate()-i);if(h.log[keyOf(d)])s++;else if(i>0)break;}return s;};
  return (<div>
    <div className="sec-hd"><h2>// Health · Habits</h2><span className="ct">this week</span></div>
    <div className="add"><input className="f" placeholder="New habit…" value={n} onChange={e=>setN(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} /><button className="btn" onClick={add}>Add</button></div>
    {data.health.habits.length===0 && <div className="empty">NO HABITS</div>}
    {data.health.habits.map(h=>(<div className="card" key={h.id}>
      <div className="row"><div><div className="ttl">{h.name}</div><div className="note" style={{fontFamily:'var(--mono)',fontSize:10}}>{streak(h)} DAY STREAK</div></div>
        <button className="x" onClick={()=>up(d=>{d.health.habits=d.health.habits.filter(z=>z.id!==h.id);})}>✕</button></div>
      <div className="week">{wk.map((d,i)=>{const k=keyOf(d),done=!!h.log[k];return(
        <div key={k} className={"day "+(done?'done':'')} onClick={()=>up(dd=>{const x=dd.health.habits.find(z=>z.id===h.id); if(x.log[k])delete x.log[k]; else x.log[k]=1;})}>
          <span className="dl">{DOW[i]}</span><span className="dn">{d.getDate()}</span></div>);})}</div>
    </div>))}
  </div>);
}

/* ---------- IDEAS + LEARNING ---------- */
function Ideas({ data, up }){
  const [it,setIt]=useState(''),[lt,setLt]=useState('');
  const addI=()=>{ if(!it.trim())return; up(d=>d.ideas.unshift({id:Date.now(),title:it.trim(),ts:Date.now()})); setIt(''); };
  const addL=()=>{ if(!lt.trim())return; up(d=>d.learning.push({id:Date.now(),title:lt.trim(),progress:0,note:''})); setLt(''); };
  return (<div>
    <div className="sec-hd"><h2>// Ideas</h2><span className="ct">{data.ideas.length}</span></div>
    <div className="add"><input className="f" placeholder="Capture an idea…" value={it} onChange={e=>setIt(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addI()} /><button className="btn" onClick={addI}>Add</button></div>
    {data.ideas.length===0 && <div className="empty">NO IDEAS YET</div>}
    {data.ideas.map(i=>(<div className="card" key={i.id}><div className="row"><div className="ttl">{i.title}</div>
      <button className="x" onClick={()=>up(d=>{d.ideas=d.ideas.filter(z=>z.id!==i.id);})}>✕</button></div></div>))}
    <div className="sec-hd"><h2>// Learning</h2><span className="ct">{data.learning.length} tracks</span></div>
    <div className="add"><input className="f" placeholder="New learning track…" value={lt} onChange={e=>setLt(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addL()} /><button className="btn" onClick={addL}>Add</button></div>
    {data.learning.map(l=>(<div className="card acc" key={l.id}>
      <div className="row"><div className="ttl">{l.title}</div>
        <span style={{display:'flex',gap:6,alignItems:'center'}}>
          <button className="btn sm" onClick={()=>up(d=>{const x=d.learning.find(z=>z.id===l.id); x.progress=Math.max(0,x.progress-10);})}>−</button>
          <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent)',minWidth:34,textAlign:'center'}}>{l.progress}%</span>
          <button className="btn sm" onClick={()=>up(d=>{const x=d.learning.find(z=>z.id===l.id); x.progress=Math.min(100,x.progress+10);})}>+</button>
          <button className="x" onClick={()=>up(d=>{d.learning=d.learning.filter(z=>z.id!==l.id);})}>✕</button></span></div>
      <div className="bar"><i style={{width:l.progress+'%'}}/></div></div>))}
  </div>);
}

/* ---------- INBOX (notes from Claude) ---------- */
function Inbox({ data, up }){
  const notes = data.inbox||[];
  const unread = notes.filter(m=>!m.read).length;
  const markAll = ()=>up(d=>{(d.inbox||[]).forEach(m=>m.read=true);});
  const clearRead = ()=>up(d=>{d.inbox=(d.inbox||[]).filter(m=>!m.read);});
  return (<div>
    <div className="sec-hd"><h2>// Inbox · from Claude</h2><span className="ct">{unread} unread</span></div>
    <div className="add" style={{justifyContent:'flex-end'}}>
      <button className="btn sm ghost" onClick={markAll}>mark all read</button>
      <button className="btn sm ghost" onClick={clearRead}>clear read</button>
    </div>
    {notes.length===0 && <div className="empty">NO MESSAGES — TALK TO CLAUDE IN CHAT AND I'LL LEAVE NOTES HERE</div>}
    {notes.map(m=>{ const k=KIND[m.kind]||KIND.flag; return (
      <div className="card" key={m.id} style={{opacity:m.read?0.5:1, borderLeftColor:k.col}}>
        <div className="row" style={{marginBottom:6}}>
          <span className="chip" style={{color:k.col,borderColor:k.col}}>{k.label}</span>
          <span style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--ink-faint)'}}>{new Date(m.ts).toLocaleDateString([],{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</span>
            {!m.read && <button className="btn sm" onClick={()=>up(d=>{const x=(d.inbox||[]).find(z=>z.id===m.id); if(x)x.read=true;})}>read</button>}
            <button className="x" onClick={()=>up(d=>{d.inbox=(d.inbox||[]).filter(z=>z.id!==m.id);})}>✕</button>
          </span>
        </div>
        <div style={{fontSize:14,lineHeight:1.55,whiteSpace:'pre-wrap'}}>{m.text}</div>
      </div>);
    })}
  </div>);
}

/* ---------- BRAIN DUMP ---------- */
function Dump({ data, up }){
  const [t,setT]=useState(''),[tag,setTag]=useState('general');
  const add=()=>{ if(!t.trim())return; up(d=>d.dump.unshift({id:Date.now(),ts:Date.now(),text:t.trim(),tag})); setT(''); };
  return (<div>
    <div className="sec-hd"><h2>// Brain Dump</h2><span className="ct">{data.dump.length} notes</span></div>
    <div className="add"><textarea className="f" placeholder="Empty your head. Tag it, find it later, Claude reads it all." value={t} onChange={e=>setT(e.target.value)} /></div>
    <div className="add"><select className="f" value={tag} onChange={e=>setTag(e.target.value)}>
      <option>general</option><option>money</option><option>work</option><option>health</option><option>ideas</option><option>life</option></select>
      <button className="btn" onClick={add}>Dump</button></div>
    {data.dump.length===0 && <div className="empty">YOUR HEAD IS EMPTY (FOR NOW)</div>}
    {data.dump.map(n=>(<div className="card" key={n.id}>
      <div className="row" style={{marginBottom:6}}><span className="chip">{n.tag}</span>
        <span style={{display:'flex',gap:8,alignItems:'center'}}>
          <span className="mut" style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--ink-faint)'}}>{new Date(n.ts).toLocaleDateString([],{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</span>
          <button className="x" onClick={()=>up(d=>{d.dump=d.dump.filter(z=>z.id!==n.id);})}>✕</button></span></div>
      <div style={{fontSize:13,lineHeight:1.55,whiteSpace:'pre-wrap'}}>{n.text}</div></div>))}
  </div>);
}

/* ---------- EXPORT MODAL ---------- */
function DataModal({ data, close }){
  return (<div className="modal" onClick={close}><div className="box" onClick={e=>e.stopPropagation()}>
    <h3>Your hub data (paste to Claude in chat)</h3>
    <pre>{JSON.stringify(data,null,2)}</pre>
    <div style={{marginTop:12}}><button className="btn" onClick={close}>Close</button></div>
  </div></div>);
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
